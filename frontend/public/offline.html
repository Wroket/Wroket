<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Wroket — Hors ligne</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
        text-align: center;
      }
      main { max-width: 22rem; }
      img { width: 4rem; height: 4rem; margin-bottom: 1rem; }
      h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
      p { margin: 0 0 1.25rem; color: #94a3b8; font-size: 0.95rem; line-height: 1.5; }
      button {
        border: none;
        border-radius: 0.5rem;
        padding: 0.65rem 1rem;
        font-size: 0.9rem;
        font-weight: 600;
        background: #10b981;
        color: #042f2e;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/wroket-icon-v4.png" alt="" width="64" height="64" />
      <h1>Vous êtes hors ligne</h1>
      <p>Reconnectez-vous à Internet pour synchroniser vos tâches et votre agenda.</p>
      <button type="button" onclick="location.reload()">Réessayer</button>
    </main>
  </body>
</html>
