# Cloud Logging log-based metric for Firestore flush exhaustion.
#
# Source log line (emitted by backend/src/persistence.ts on saveToFirestore):
#   severity: ERROR
#   jsonPayload: { event: "persistence-flush", status: "exhausted", ... }
#
# Apply with:
#   gcloud logging metrics create persistence_flush_exhausted_events \
#     --config-from-file=infra/monitoring/log-metric-flush-exhausted.yaml \
#     --project=involuted-reach-490718-h4
#
# Re-apply (idempotent):
#   gcloud logging metrics update persistence_flush_exhausted_events \
#     --config-from-file=infra/monitoring/log-metric-flush-exhausted.yaml \
#     --project=involuted-reach-490718-h4

description: "Counts Firestore flush exhaustion events (dirty store/* not persisted)"

filter: |
  resource.type="cloud_run_revision"
  resource.labels.service_name="wroket-api"
  severity=ERROR
  jsonPayload.event="persistence-flush"
  jsonPayload.status="exhausted"

metricDescriptor:
  metricKind: DELTA
  valueType: INT64
  unit: "1"
  labels:
    - key: lastError
      valueType: STRING
      description: "Message of the last Firestore write error at flush time"

labelExtractors:
  lastError: 'EXTRACT(jsonPayload.lastError)'
