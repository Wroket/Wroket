# Alert policy that fires as soon as the `todos_drift_events` log-based metric
# records any sample > 0 over the last hour. Pairs with
# infra/monitoring/log-metric-todos-drift.yaml.
#
# Before applying:
#   1) List existing notification channels:
#        gcloud alpha monitoring channels list --project=involuted-reach-490718-h4 --format='value(name,type,displayName)'
#   2) Pick (or create) an email channel and substitute the placeholder
#      below: replace `NOTIFICATION_CHANNEL_ID` with the trailing id segment
#      of the channel name (e.g. `1234567890123456789`).
#
# Apply with:
#   gcloud alpha monitoring policies create \
#     --policy-from-file=infra/monitoring/alert-policy-todos-drift.yaml \
#     --project=involuted-reach-490718-h4

displayName: "Todos drift detected (legacy <-> todos_v2)"

# OR combiner is fine — we have a single condition for now.
combiner: OR

conditions:
  - displayName: "todos_drift_events > 0 (1h window)"
    conditionThreshold:
      # Aggregated count of jsonPayload.event=todos-drift status=drift entries.
      filter: |
        metric.type="logging.googleapis.com/user/todos_drift_events"
        resource.type="cloud_run_revision"
      comparison: COMPARISON_GT
      thresholdValue: 0
      # 0s = fire on the first qualifying sample (no sustained-window suppression).
      duration: 0s
      aggregations:
        - alignmentPeriod: 3600s
          perSeriesAligner: ALIGN_SUM

notificationChannels:
  # Channel "Wroket" → team@wroket.com. To target a different channel, list
  # available ones with `gcloud alpha monitoring channels list` (see README).
  - projects/involuted-reach-490718-h4/notificationChannels/12683066122650849013

severity: ERROR

documentation:
  mimeType: text/markdown
  content: |
    ## Drift between legacy todos and todos_v2

    The hourly `todosDriftMonitor` detected at least one user whose todo
    row counts diverge between the legacy in-memory map (sourced from
    `store/todos_{shard}`) and the `todos_v2` Firestore collection.

    **Why it matters**: in `TODOS_STORAGE_MODE=dual` the frontend reads
    from legacy; rows present only in `todos_v2` are invisible to the
    user. In `v2` mode, rows present only in legacy would be lost on
    deploy. Either way, action is required.

    **What to do**:
    1. Find the worst offender uid in the alert payload
       (`metric.label.worstOwnerUid`) or in the source log
       (`jsonPayload.worstOwner`).
    2. Run the reconcile script (dry-run first, then write):
       ```bash
       npx ts-node backend/src/scripts/reconcileLegacyV2Drift.ts --uid <uid>
       RUN_MIGRATION=reconcile_legacy_v2 npx ts-node backend/src/scripts/reconcileLegacyV2Drift.ts --uid <uid>
       ```
       Or to fix every drifted user at once:
       ```bash
       RUN_MIGRATION=reconcile_legacy_v2 npx ts-node backend/src/scripts/reconcileLegacyV2Drift.ts --all
       ```
    3. Verify the next hourly tick logs `event:"todos-drift", status:"ok"`.

# Auto-close incidents that go quiet for a day to avoid stale alerts after a
# manual reconcile clears the drift.
alertStrategy:
  autoClose: 86400s
