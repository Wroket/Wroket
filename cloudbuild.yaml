steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_BASE_URL=https://api.wroket.com'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wroket-api'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'wroket-run@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '1'
      # ADMIN_EMAILS omitted here (value contains commas) — applied in the next step via `services update`.
      - '--update-env-vars'
      - 'COOKIE_SECURE=true,ALLOWED_ORIGINS=https://wroket.com;https://www.wroket.com,FRONTEND_URL=https://wroket.com,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_SSO_REDIRECT_URI=https://api.wroket.com/auth/google/callback,GOOGLE_REDIRECT_URI=https://api.wroket.com/calendar/google/callback'
      # Required in production (server.ts): Calendar OAuth + Google SSO state signing. Create in Secret Manager if missing.
      - '--set-secrets'
      - 'OAUTH_STATE_SECRET=OAUTH_STATE_SECRET:latest'

  # Single-var update: comma inside ADMIN_EMAILS needs alternate delimiter (gcloud topic escaping).
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'wroket-api'
      - '--region=europe-west1'
      - '--update-env-vars'
      - '^##^ADMIN_EMAILS=francois@broudeur.com,team@wroket.com'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wroket-web'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'wroket-run@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
