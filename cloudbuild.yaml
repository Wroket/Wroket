steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:latest'
      - './backend'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_BASE_URL=https://api.wroket.com'
      - './frontend'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web']

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wroket-api'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'wroket-run@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      # min=1: keep one warm replica (no cold starts on first request).
      # max=2: cross-replica consistency is now safe:
      #   - todos → collection todos_v2 + onSnapshot listener
      #     (backend/src/persistence.ts attachLiveInvalidation v2 branch).
      #   - activity log → append-only collection activity_log_v2
      #     (backend/src/services/activityLogService.ts).
      #   - other domains → store/{domain} onSnapshot listeners (existing).
      # The remaining single-document `store/activityLog` write is best-effort
      # only (admin UI reads from activity_log_v2), so a lost replica race on
      # that doc has no user-visible effect.
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '2'
      # ADMIN_EMAILS omitted here (value contains commas) — applied in the next step via `services update`.
      - '--update-env-vars'
      # TODOS_STORAGE_MODE=v2 → reads & writes through `todos_v2` (one Firestore
      # doc per todo). The legacy single-doc shards remain readable for emergency
      # rollback (revert this line to `dual`, redeploy) but are no longer written.
      # Pre-flight before cutover: drift audit returned 0 for every uid
      # (see backend/src/scripts/reconcileLegacyV2Drift.ts).
      - 'COOKIE_SECURE=true,ALLOWED_ORIGINS=https://wroket.com;https://www.wroket.com,FRONTEND_URL=https://wroket.com,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_SSO_REDIRECT_URI=https://api.wroket.com/auth/google/callback,GOOGLE_REDIRECT_URI=https://api.wroket.com/calendar/google/callback,MICROSOFT_TENANT_ID=common,MICROSOFT_SSO_REDIRECT_URI=https://api.wroket.com/auth/microsoft/callback,MICROSOFT_GRAPH_REDIRECT_URI=https://api.wroket.com/calendar/microsoft/callback,ATTACHMENTS_BUCKET=wroket-attachments,ATTACHMENTS_BACKEND=gcs,TODOS_STORAGE_MODE=v2,TODOS_DOC_COLLECTION=todos_v2,VAPID_SUBJECT=mailto:team@wroket.com'
      # Required in production (server.ts): OAuth state signing + Microsoft SSO + Web Push VAPID from Secret Manager.
      # Create secrets first: `npx web-push generate-vapid-keys` → VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY in Secret Manager.
      # Grant wroket-run@… Secret Accessor on each secret. --set-secrets replaces the full list (see .cursor/rules/cloudbuild.mdc).
      - '--set-secrets'
      - 'OAUTH_STATE_SECRET=OAUTH_STATE_SECRET:latest,MICROSOFT_CLIENT_ID=MICROSOFT_CLIENT_ID:latest,MICROSOFT_CLIENT_SECRET=MICROSOFT_CLIENT_SECRET:latest,VAPID_PUBLIC_KEY=VAPID_PUBLIC_KEY:latest,VAPID_PRIVATE_KEY=VAPID_PRIVATE_KEY:latest'

  # Single-var update: comma inside ADMIN_EMAILS needs alternate delimiter (gcloud topic escaping).
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - 'wroket-api'
      - '--region=europe-west1'
      - '--update-env-vars'
      - '^##^ADMIN_EMAILS=francois@broudeur.com,team@wroket.com'

  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'wroket-web'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
      - '--region'
      - 'europe-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--service-account'
      - 'wroket-run@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '2'

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/api:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/wroket/web:$SHORT_SHA'
