name: E2E smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# GitHub-hosted runners: opt into Node 24 for actions (checkout/setup-node/upload-artifact) before the default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    # First run can spend ~15 min on browser download + system deps; webServer timeout is 6 min in CI.
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
            package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix backend --ignore-scripts
          npm ci --prefix frontend --ignore-scripts
          npm ci --prefix e2e
          npm ci

      - name: Backend .env for CI (local store)
        run: |
          printf '%s\n' \
            'PORT=3001' \
            'USE_LOCAL_STORE=true' \
            'ALLOWED_ORIGINS=http://127.0.0.1:3000,http://localhost:3000' \
            'FRONTEND_URL=http://localhost:3000' \
            > backend/.env

      - name: Resolve Playwright version
        id: playwright-version
        working-directory: e2e
        run: |
          echo "version=$(node -e "console.log(require('@playwright/test/package.json').version)")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium (full)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        # Use npm --prefix (npx does not support --prefix; it was passed to playwright and failed).
        run: npm run install:browsers --prefix e2e

      - name: Install Playwright Chromium (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          npx playwright install-deps chromium
          npx playwright install chromium
        working-directory: e2e

      - name: Run E2E smoke
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
