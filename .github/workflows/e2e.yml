name: E2E smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# GitHub-hosted runners: opt into Node 24 for actions (checkout/setup-node/upload-artifact) before the default switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json
            package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix backend --ignore-scripts
          npm ci --prefix frontend --ignore-scripts
          npm ci --prefix e2e
          npm ci

      - name: Backend .env for CI (local store)
        run: |
          printf '%s\n' \
            'PORT=3001' \
            'USE_LOCAL_STORE=true' \
            'ALLOWED_ORIGINS=http://127.0.0.1:3000,http://localhost:3000' \
            'FRONTEND_URL=http://localhost:3000' \
            > backend/.env

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium --prefix e2e

      - name: Run E2E smoke
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
          if-no-files-found: ignore
